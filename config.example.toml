# Copy this file to config.toml and fill in real values.
# Never commit config.toml, .env, Telegram session files, or SQLite databases.

database_path = "data/bot.sqlite3"
timezone = "Asia/Seoul"
lookback_hours = 24

# catch-up 명령은 매일 이 시각을 기준으로 기간을 끊는다.
# 예: 11이면 "전날 11:00 ~ 오늘 10:59"를 한 다이제스트로 처리한다.
daily_digest_hour = 11
catch_up_max_days = 7

max_messages_per_channel = 500

# Public usernames, invite links, or entities your Telegram account can access.
sources = [
  "aetherjapanresearch",
  "kwusa",
]

[telegram]
# Get these from https://my.telegram.org.
api_id = 0
api_hash = ""
session_path = "data/telegram.session"

[bot]
# BotFather bot is only used to send the final digest to you.
token = ""
chat_id = ""

[llm]
# If disabled, the bot uses a deterministic extractive digest.
enabled = false

# Gemini example:
# enabled = true
# api_key = "YOUR_GEMINI_API_KEY"
# base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
# model = "gemini-2.5-flash"

# OpenAI-compatible endpoints work for Gemini, OpenAI, Groq, OpenRouter, and similar APIs.
api_key = ""
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
model = "gemini-2.5-flash"
temperature = 0.2
timeout_sec = 180

# LLM 입력이 너무 크면 Gemini 응답이 느려져 timeout이 날 수 있다.
# 처음에는 작게 시작하고, 요약 품질이 부족하면 늘리는 쪽이 안정적이다.
max_messages = 40
max_chars_per_message = 400

